<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="records.css">
  <title>記録</title>
</head>

<body>
  <div class="card" data-tauri-drag-region>

    <header class="header" data-tauri-drag-region>
      <span class="header-title">記録</span>
      <div class="tabs">
        <button class="tab" id="tab-yesterday">昨日</button>
        <button class="tab active" id="tab-today">今日</button>
        <button class="tab" id="tab-week">今週</button>
        <button class="tab" id="tab-month">今月</button>
        <button class="tab" id="tab-all">全期間</button>
      </div>
    </header>
    <button class="close-btn" id="close-btn" title="閉じる">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
        <path
          d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
      </svg>
    </button>

    <div class="subheader">
      <div class="view-tabs">
        <button class="view-tab active" id="view-summary">集計</button>
        <button class="view-tab" id="view-list">一覧</button>
        <button class="view-tab" id="view-graph">グラフ</button>
      </div>
    </div>

    <div class="list-wrap">
      <div class="list" id="list"></div>
    </div>

    <footer class="footer">
      <div class="footer-total">
        <span class="footer-label">作業</span>
        <span class="footer-time" id="footer-time">—</span>
        <span class="footer-break" id="footer-break"></span>
      </div>
      <div class="footer-actions">
        <button class="add-btn" id="add-btn" title="作業を追加">＋</button>
        <button class="reset-btn" id="reset-btn">リセット</button>
      </div>
    </footer>

    <div class="add-form hidden" id="add-form">
      <div class="add-form-header">
        <span class="add-form-title">作業を追加</span>
      </div>
      <div class="add-form-fields">
        <div class="add-field">
          <label class="add-label">日付</label>
          <input type="date" id="add-date" class="add-input">
        </div>
        <div class="add-field">
          <label class="add-label">開始</label>
          <input type="time" id="add-start" class="add-input add-time">
        </div>
        <div class="add-field">
          <label class="add-label">終了</label>
          <input type="time" id="add-end" class="add-input add-time">
          <span class="add-duration-preview" id="add-duration-preview"></span>
        </div>
        <div class="add-field">
          <label class="add-label">タスク</label>
          <input type="text" id="add-task" class="add-input" list="add-task-list" placeholder="タスク名">
          <datalist id="add-task-list"></datalist>
        </div>
      </div>
      <div class="add-form-actions">
        <button class="add-cancel-btn" id="add-cancel-btn">キャンセル</button>
        <button class="add-submit-btn" id="add-submit-btn">追加する</button>
      </div>
    </div>

  </div>
  <script src="records.js" type="module"></script>
</body>

</html>
